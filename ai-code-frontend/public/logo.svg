<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1677ff"/>
      <stop offset="100%" stop-color="#4096ff"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#bae0ff"/>
    </linearGradient>
  </defs>
  <!-- 圆角矩形背景 -->
  <rect x="8" y="8" width="112" height="112" rx="24" fill="url(#bg)"/>
  <!-- AI 脑形电路图案 -->
  <!-- 中央节点 -->
  <circle cx="64" cy="64" r="12" fill="#fff" opacity="0.95"/>
  <!-- 左上节点 -->
  <circle cx="40" cy="40" r="6" fill="url(#spark)"/>
  <line x1="40" y1="40" x2="54" y2="54" stroke="url(#spark)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 右上节点 -->
  <circle cx="88" cy="40" r="6" fill="url(#spark)"/>
  <line x1="88" y1="40" x2="74" y2="54" stroke="url(#spark)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 左下节点 -->
  <circle cx="40" cy="88" r="6" fill="url(#spark)"/>
  <line x1="40" y1="88" x2="54" y2="74" stroke="url(#spark)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 右下节点 -->
  <circle cx="88" cy="88" r="6" fill="url(#spark)"/>
  <line x1="88" y1="88" x2="74" y2="74" stroke="url(#spark)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 横向连线 -->
  <line x1="46" y1="40" x2="82" y2="40" stroke="url(#spark)" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="46" y1="88" x2="82" y2="88" stroke="url(#spark)" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
</svg>
